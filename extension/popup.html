<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 220px; padding: 16px; font-family: system-ui, sans-serif; background: #171717; color: #e5e5e5; }
    h2 { font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.online { background: #22c55e; }
    .dot.offline { background: #ef4444; }
    .row { font-size: 12px; margin-bottom: 6px; color: #a3a3a3; }
    input { width: 100%; padding: 4px 8px; font-size: 12px; background: #262626; border: 1px solid #404040; border-radius: 4px; color: #e5e5e5; outline: none; }
    input:focus { border-color: #3b82f6; }
    .tip { margin-top: 10px; font-size: 10px; color: #737373; }
  </style>
</head>
<body>
  <h2>
    <span id="status-dot" class="dot offline"></span>
    <span id="status-text">Medix</span>
  </h2>
  <div class="row">
    <label>端口</label>
    <input id="port" type="number" value="8765" placeholder="8765">
  </div>
  <p class="tip">右键网页图片 → "添加到 Medix"</p>
  <script src="popup.js"></script>
</body>
</html>
